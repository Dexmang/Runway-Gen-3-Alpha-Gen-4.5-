<!DOCTYPE html><html><head><style>
body{background:#111;color:#fff;font-family:sans-serif;margin:0;padding:20px}
h1{text-align:center;font-size:1.4rem;color:#C5D932;margin-bottom:8px}
p.sub{text-align:center;color:#888;font-size:0.8rem;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#1a1a1a;border:2px solid transparent;border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#C5D932}
.card.selected{border-color:#C5D932;box-shadow:0 0 12px rgba(197,217,50,0.4)}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.card .info{padding:8px 10px;font-size:0.75rem}
.card .name{color:#fff;font-weight:600}
.card .dur{color:#888;margin-top:2px}
.current{color:#C5D932;font-size:0.65rem;margin-top:2px}
</style></head><body>
<h1>Exterior Video Clips — Pick Your Hero</h1>
<p class="sub">Current hero: IMG_8121 (walkaround, 10.6s). Click a clip to select it.</p>
<div class="grid" id="grid"></div>
<script>

{name:'IMG_8121',dur:'10.556667s'},

{name:'IMG_8164',dur:'6.738333s'},
{name:'IMG_8165',dur:'5.086667s'},

const grid = document.getElementById('grid');
clips.forEach(c => {

  card.onclick = () => {
    document.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
    card.classList.add('selected');
  };
  grid.appendChild(card);
});
</script></body></html>
